<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Review Sentiment Analyzer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #131a2f;
      --panel-2: #1b2542;
      --text: #eef2ff;
      --muted: #a7b0d6;
      --line: rgba(255,255,255,0.08);
      --accent: #8b5cf6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #18213f 0%, var(--bg) 45%);
      color: var(--text);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 18px 48px;
    }
    .hero {
      margin-bottom: 22px;
      text-align: center;
    }
    .hero h1 {
      margin: 0;
      font-size: 2.2rem;
    }
    .hero-title-row {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .steam-logo {
      width: 32px;
      height: 32px;
      flex: 0 0 auto;
      object-fit: contain;
      border-radius: 8px;
      display: inline-block;
    }
    .repo-link {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #000000;
      background: transparent;
      border: none;
      text-decoration: none;
      transition: transform 0.15s ease, opacity 0.18s ease;
    }
    .repo-link:hover {
      transform: translateY(-1px);
      opacity: 0.82;
    }
    .repo-link svg, .steam-logo svg {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }
    .panel {
      border: 1px solid var(--line);
      background: rgba(19,26,47,0.92);
      border-radius: 22px;
      padding: 22px;
      margin-bottom: 22px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.22);
    }
    .label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: #dbe3ff;
    }
    .input, .select, .button {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 12px 14px;
      font-size: 1rem;
      background: var(--panel-2);
      color: var(--text);
    }
    .button {
      background: linear-gradient(135deg, var(--accent), #6d28d9);
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: transform 0.15s ease, background 0.18s ease, box-shadow 0.18s ease;
    }
    .button:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 10px 24px rgba(34,197,94,0.22);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .featured-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }
    .featured-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 16px 36px rgba(0,0,0,0.22);
    }
    .poster-wrap {
      aspect-ratio: 2 / 3;
      background: #0f172a;
    }
    .poster {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
    .featured-body {
      padding: 14px;
    }
    .featured-title {
      margin: 0 0 12px;
      font-size: 1.1rem;
      text-align: center;
    }
    .mini-form { margin: 0; }
    .mini-button {
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #dbe3ff);
      color: #111827;
      transition: transform 0.15s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }
    .mini-button:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      box-shadow: 0 10px 24px rgba(34,197,94,0.22);
    }
    .section-title {
      margin: 0 0 14px;
      font-size: 1.25rem;
    }
    .hint {
      color: var(--muted);
      margin-top: 10px;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    @media (max-width: 980px) {
      .featured-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 720px) {
      .grid, .featured-grid { grid-template-columns: 1fr; }
      .hero h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-title-row">
        <h1>Steam Review Sentiment Analyzer</h1>
        <img
          class="steam-logo"
          src="https://store.steampowered.com/favicon.ico"
          alt="Steam logo"
          loading="eager"
        >
        <a class="repo-link" href="https://github.com/itsalissonsilva/GameSentiment" target="_blank" rel="noopener noreferrer" aria-label="View the GitHub repository">
          <svg viewBox="0 0 16 16" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <path fill="#ffffff" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
          </svg>
        </a>
      </div>
    </section>

    <section class="panel">
      <h2 class="section-title">Featured games</h2>
      <div class="featured-grid">
        {% for game in featured_games %}
          <div class="featured-card">
            <div class="poster-wrap">
              <img
                class="poster"
                src="https://cdn.cloudflare.steamstatic.com/steam/apps/{{ game.appid }}/library_600x900_2x.jpg"
                alt="{{ game.name }} poster"
                loading="lazy"
              >
            </div>
            <div class="featured-body">
              <h3 class="featured-title">{{ game.name }}</h3>
              <form class="mini-form" action="/analyze" method="post">
                <input type="hidden" name="query" value="{{ game.appid }}">
                <input type="hidden" name="language" value="english">
                <input type="hidden" name="max_reviews" value="100">
                <input type="hidden" name="filter_mode" value="recent">
                <input type="hidden" name="review_type" value="all">
                <input type="hidden" name="purchase_type" value="steam">
                <button class="mini-button" type="submit">Analyze {{ game.name }}</button>
              </form>
            </div>
          </div>
        {% endfor %}
      </div>
    </section>

    <section class="panel">
      <h2 class="section-title">Analyze another game</h2>
      <form action="/analyze" method="post">
        <div style="margin-bottom:16px;">
          <label class="label" for="query">Steam app ID</label>
          <input class="input" id="query" name="query" placeholder="e.g. 730, 570, 1145360" required>
        </div>

        <div class="grid">
          <div>
            <label class="label" for="language">Language</label>
            <select class="select" id="language" name="language">
              {% for option in language_options %}
                <option value="{{ option }}">{{ option }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label" for="max_reviews">Max written reviews</label>
            <input class="input" id="max_reviews" name="max_reviews" type="number" min="20" max="300" value="100">
          </div>
          <div>
            <label class="label" for="filter_mode">Order / filter mode</label>
            <select class="select" id="filter_mode" name="filter_mode">
              {% for option in filter_options %}
                <option value="{{ option }}">{{ option }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label" for="review_type">Review type</label>
            <select class="select" id="review_type" name="review_type">
              {% for option in review_type_options %}
                <option value="{{ option }}">{{ option }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label" for="purchase_type">Purchase type</label>
            <select class="select" id="purchase_type" name="purchase_type">
              {% for option in purchase_type_options %}
                <option value="{{ option }}">{{ option.replace('_', ' ') }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div style="margin-top:16px;">
          <button class="button" type="submit">Analyze reviews</button>
        </div>
        <p class="hint">Try 730, 570, 1091500, 1145360, 1172470, or 271590.</p>
      </form>
    </section>
  </div>
</body>
</html>
